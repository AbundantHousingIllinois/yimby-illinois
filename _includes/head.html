<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏘️</text></svg>">
<meta name="theme-color" content="#1a1a1a">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "YIMBY Illinois",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "description": "{{ site.description | default: 'Fighting for abundant, affordable housing across Illinois' }}",
  "address": {
    "@type": "PostalAddress",
    "addressRegion": "IL",
    "addressCountry": "US"
  }
}
</script>
