title: YIMBY Illinois
description: "Yes In My Backyard. Fighting for abundant, affordable housing across Illinois."
url: "https://yimbyillinois.org"
baseurl: ""
lang: en

markdown: kramdown
sass:
  style: compressed
  sass_dir: _sass

plugins:
